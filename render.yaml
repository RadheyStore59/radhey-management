services:
  # Full Stack Application (Frontend + Backend)
  - type: web
    name: radhey-management
    env: node
    buildCommand: npm install && npm install --prefix server && npm run build
    startCommand: npm start
    staticPublishPath: build
    routes:
      - route: /api/*
        directory: .
        spa: false
      - route: /*
        directory: build
        spa: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: "--max-old-space-size=4096"
      - key: MONGODB_URI
        value: mongodb+srv://your_username:your_password@your_cluster.mongodb.net/radhey-management?retryWrites=true&w=majority
      - key: JWT_SECRET
        value: your_jwt_secret_key_here_change_this_in_production
