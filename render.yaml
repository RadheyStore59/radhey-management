services:
  # React Frontend
  - type: web
    name: radhey-management-frontend
    env: static
    buildCommand: npm install && NODE_OPTIONS=--max-old-space-size=4096 npm run build
    staticPublishPath: build
    routes:
      - route: /*
        directory: build
        spa: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=4096"
      
  # Backend Server (if you have one)
  - type: web
    name: radhey-management-backend
    env: node
    buildCommand: cd server && npm ci
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
