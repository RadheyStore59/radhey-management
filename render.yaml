services:
  # React Frontend
  - type: web
    name: radhey-management-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - route: /*
        directory: build
        spa: true
    envVars:
      - key: NODE_ENV
        value: production
      
  # Backend Server (if you have one)
  - type: web
    name: radhey-management-backend
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
